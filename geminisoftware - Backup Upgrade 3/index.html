<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Ultra Desktop</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app-container">
        <aside id="sidebar">
            <button id="new-chat-btn"><i class="fas fa-plus"></i> Nouveau Chat</button>
            <div id="conversations-list"></div>
            <div class="sidebar-footer">
                <select id="model-select">
                    <option value="gemini-3-flash-preview">Gemini 3 Flash (Nouveau)</option>
                    <option value="gemma-3-27b-it">Gemma 3 27B (Ultra Rapide)</option>                  
                    <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash</option>
                    <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
                </select>
            </div>
        </aside>

        <main id="chat-main">
            <header id="chat-header">
                <h2 id="current-chat-title">Nouvelle discussion</h2>
                <button id="delete-chat-btn"><i class="fas fa-trash-alt"></i></button>
            </header>
            
            <div id="chat-box"></div>

            <div id="input-area">
                <div id="preview-container"></div>
                <div id="input-wrapper">
                    <label for="file-input" class="action-btn"><i class="fas fa-paperclip"></i></label>
                    <input type="file" id="file-input" multiple hidden>
                    <textarea id="prompt-input" placeholder="Demandez n'importe quoi..." rows="1"></textarea>
                    <button id="submit-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
